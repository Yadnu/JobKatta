<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>body{margin:0;padding:0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrapper{max-width:600px;margin:32px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08)}.header{background:#F97316;padding:28px 32px;text-align:center}.header h1{margin:0;color:#fff;font-size:24px;font-weight:700}.header p{margin:4px 0 0;color:rgba(255,255,255,.85);font-size:13px}.body{padding:32px;color:#1E293B;line-height:1.7}.body h2{margin:0 0 12px;font-size:20px}.body p{margin:0 0 16px;font-size:15px;color:#475569}.job-card{border:1px solid #e2e8f0;border-radius:8px;padding:16px;margin:10px 0}.job-card h3{margin:0 0 4px;font-size:15px;color:#1E293B}.job-card p{margin:0;font-size:13px;color:#64748b}.job-card a{color:#F97316;text-decoration:none;font-weight:600;font-size:13px}.btn{display:inline-block;margin:16px 0 8px;padding:13px 28px;background:#F97316;color:#fff!important;text-decoration:none;border-radius:8px;font-weight:600;font-size:15px}.footer{background:#f8fafc;padding:20px 32px;text-align:center;font-size:12px;color:#94a3b8}.footer a{color:#F97316;text-decoration:none}</style>
</head><body><div class="wrapper">
<div class="header"><h1>Job Katta</h1><p>Your Daily Job Digest</p></div>
<div class="body">
  <h2>{{jobCount}} new jobs matching your preferences</h2>
  <p>Hi {{name}}, here are today's new job opportunities for you.</p>
  {{jobCards}}
  <a class="btn" href="{{clientUrl}}/jobs">Browse All Jobs</a>
  <p style="font-size:12px;color:#94a3b8">To manage your job alerts, <a href="{{clientUrl}}/candidate/alerts" style="color:#F97316">click here</a>.</p>
</div>
<div class="footer">&copy; 2025 Job Katta &middot; <a href="{{clientUrl}}">jobkatta.in</a></div>
</div></body></html>
