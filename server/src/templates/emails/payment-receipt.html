<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>body{margin:0;padding:0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrapper{max-width:600px;margin:32px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08)}.header{background:#22C55E;padding:28px 32px;text-align:center}.header h1{margin:0;color:#fff;font-size:24px;font-weight:700}.header p{margin:4px 0 0;color:rgba(255,255,255,.85);font-size:13px}.body{padding:32px;color:#1E293B;line-height:1.7}.body h2{margin:0 0 12px;font-size:20px}.body p{margin:0 0 16px;font-size:15px;color:#475569}.receipt-table{width:100%;border-collapse:collapse;margin:16px 0}.receipt-table td{padding:10px 0;border-bottom:1px solid #e2e8f0;font-size:14px}.receipt-table td:last-child{text-align:right;font-weight:600}.total-row td{border-bottom:none;font-size:16px;color:#1E293B;padding-top:14px}.btn{display:inline-block;margin:8px 0 20px;padding:13px 28px;background:#F97316;color:#fff!important;text-decoration:none;border-radius:8px;font-weight:600;font-size:15px}.footer{background:#f8fafc;padding:20px 32px;text-align:center;font-size:12px;color:#94a3b8}.footer a{color:#F97316;text-decoration:none}</style>
</head><body><div class="wrapper">
<div class="header"><h1>Job Katta</h1><p>Payment Receipt</p></div>
<div class="body">
  <h2>Payment successful! ✅</h2>
  <p>Thank you for your payment. Your plan has been activated.</p>
  <table class="receipt-table">
    <tr><td>Plan</td><td>{{planKey}}</td></tr>
    <tr><td>Order ID</td><td>{{orderId}}</td></tr>
    <tr><td>Payment ID</td><td>{{paymentId}}</td></tr>
    <tr class="total-row"><td>Amount Paid</td><td>₹{{amount}}</td></tr>
  </table>
  <a class="btn" href="{{clientUrl}}/candidate/subscription">View Plan Details</a>
  <p style="font-size:13px;color:#94a3b8">Keep this email for your records.</p>
</div>
<div class="footer">&copy; 2025 Job Katta &middot; <a href="{{clientUrl}}">jobkatta.in</a></div>
</div></body></html>
